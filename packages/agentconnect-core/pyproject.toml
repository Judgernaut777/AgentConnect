[build-system]
requires = ["setuptools>=77", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "agentconnect-core"
version = "0.1.0"
description = "Shared contracts and policy-agnostic core for the AgentConnect Router and Model Manager (schemas, config, state machine, shared memory, quota, privacy, secrets)."
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
license-files = ["LICENSE"]
dependencies = [
    "pydantic>=2.5",
    "pyyaml>=6.0",
    # Runtime dependency of the shipped HTTP clients: the memory adapter
    # (core/memory.py), the ComputeConnect provider (core/local_compute.py), and
    # the ToolConnect governor (core/toolconnect_client.py) all reach their sibling
    # service over httpx. It is imported lazily (only the network path needs it),
    # but it is a real, non-optional dependency — a base agentconnect-core install
    # must be able to talk to a memory/compute/tool backend without a combined venv
    # transitively supplying httpx.
    "httpx>=0.27",
]

# Safety engines are opt-in. The default install carries the standard-library
# `baseline` engine and nothing else: no model weights, no torch, no subprocess.
# TruffleHog and Gitleaks are external binaries, deliberately not pip dependencies —
# install them yourself and point `executable:` at them.
[project.optional-dependencies]
safety-secrets = ["detect-secrets>=1.5"]
safety-pii = ["presidio-analyzer>=2.2"]
safety-pii-gliner = ["gliner>=0.2"]
safety-injection = ["torch>=2.0", "transformers>=4.40"]
safety-all = [
    "detect-secrets>=1.5",
    "presidio-analyzer>=2.2",
    "gliner>=0.2",
    "torch>=2.0",
    "transformers>=4.40",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["agentconnect.common*", "agentconnect.core*", "agentconnect.safety*"]
namespaces = true

[tool.setuptools.package-data]
# Packaged default config (empty provider/profile registries + fail-closed routing
# policy) so an installed router starts without a source checkout.
"agentconnect.common" = ["default_config/*.yaml"]
