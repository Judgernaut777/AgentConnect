# PACKAGED DEFAULT — a copy of the repo's config/routing.yaml policy (plus this header).
# Pure policy (privacy gates, scoring weights): fail-closed and host-free, so it is
# safe to ship as the default an installed router starts with. Deployments override
# via AGENTCONNECT_CONFIG_DIR.
# Router policy: privacy gates, output policy, model switching, local defaults,
# and the scoring weights for provider selection (handoff §9, §10, §12, §13,
# §16, §18).

# --- Privacy routing rules (§13) ---------------------------------------------
# For each privacy class, the set of provider privacy tiers that MAY receive the
# task. These are HARD constraints applied before scoring (§12).
privacy:
  classes:
    public:         [local_only, private_rented, external, external_paid]
    low_sensitive:  [local_only, private_rented, external, external_paid]  # after redaction
    repo_sensitive: [local_only]        # + private_rented ONLY with task opt-in (allow_rented)
    secret_sensitive: []                                    # never sent to any LLM/node
    restricted:     [local_only]                            # unless explicitly approved
  # Classes that require the redaction pass to succeed before any external route.
  require_redaction: [low_sensitive]
  # Classes that must never reach an LLM at all — block or redact. Informational,
  # not yet read by code: the block is enforced by `classes` mapping
  # secret_sensitive to [] above (fail-closed), not by this flag.
  block_from_llm: [secret_sensitive]
  # A repo_sensitive task may use a rented node only with explicit opt-in AND when
  # the node satisfies its trust policy (ephemeral/encrypted/own-image/no-logging).
  # Informational, not yet read by code: the opt-in + trust check is enforced
  # unconditionally (fail-closed) regardless of this flag.
  rented_repo_sensitive_requires_optin: true

# --- MCP output policy: context virtualization (§9) --------------------------
mcp_output_policy:
  default_max_chars: 4000
  hard_max_chars: 12000
  # The booleans below are informational, not yet read by code: only the two
  # char limits above are enforced; the whole block is echoed back verbatim as
  # `output_policy` metadata on tool results.
  never_return_full_logs: true
  never_return_full_repo_files: true
  never_return_full_traces: true
  return_refs_for_large_outputs: true
  require_explicit_chunk_read: true

# --- Local model residency / switching (§16) ---------------------------------
model_switching:
  # Informational, not yet read by code: the live default resident model comes
  # from profiles.yaml `default_resident_model`.
  default_resident_model: qwen3.6-35b-a3b
  prefer_resident_model: true
  avoid_switch_if_current_queue_nonempty: true
  min_batch_size_for_switch: 4
  min_residency_seconds: 600              # not yet read by code
  urgent_switch_allowed: true
  specialist_review_can_wait: true        # not yet read by code
  switch_back_to_default_when_idle: true  # not yet read by code

# --- Local inference admission defaults (§18) --------------------------------
local_inference_defaults:
  # main_model / max_active_sequences / max_model_len are informational, not yet
  # read by code — the model manager takes its admission limits from its own
  # constructor defaults. Only default_max_output_tokens is read (by the router).
  main_model: qwen3.6-35b-a3b
  max_active_sequences: 4
  max_model_len: 16384
  default_max_output_tokens: 1200

# --- Provider scoring weights (§12) ------------------------------------------
# score = sum(bonus terms) - sum(penalty terms). Hard constraints override.
scoring:
  weights:
    capability_fit: 3.0
    expected_quality: 2.0
    latency_fit: 1.0
    privacy_fit: 1.5
    availability: 1.0
    residency_bonus: 2.5
    quota_scarcity_penalty: 2.0
    queue_delay_penalty: 1.5
    # A resident-model task pays no switch penalty; a specialist that is not loaded
    # pays the full model_switch_penalty unless the batch threshold is met.
    model_switch_penalty: 3.0
    cost_penalty: 2.0
    opportunity_cost: 1.5
    # Rented GPU nodes (Goal 4): spin-up/min-window setup + hourly-cost penalties.
    rental_setup_penalty: 2.0
    rental_cost_penalty: 2.0
    # Learned-quality prior from observed outcomes (Phase 6). Bounded [-1,1] signal
    # * this weight; kept modest so it tilts close calls, never dominates.
    learned_quality: 1.5
    # Global spend-budget pace pressure (see `budget` below). [0,1] pressure * weight
    # steers paid/rented down as spend nears the cap or runs ahead of pace.
    budget_pressure_penalty: 3.0
  # Minimum observations before a provider's learned signal is used at all.
  learned_min_samples: 5
  quota_scarcity_threshold_pct: 0.20   # penalize when <20% of a quota remains

# --- Global spend budget: policy only, NO amount (handoff budget feature) --------
# The amount + period are set by the user at runtime via the set_budget MCP tool and
# persisted in shared memory. There is deliberately NO default amount here: until the
# user explicitly sets a budget, paid cloud and rented GPU are disabled (fail-closed)
# and the router asks the manager agent to prompt for one.
budget:
  require_explicit: true        # paid/rented ineligible until a budget is set
  suggested_period: monthly     # daily | weekly | monthly (hint for the prompt)
